<!DOCTYPE html>
<html>
<head>
    <title>Simple JS Assignment 2</title>
</head>
<body style="font-family: Arial; padding: 20px;">

    <h2>JavaScript Assignment 2</h2>
    <hr>

    <div style="margin-bottom: 30px;">
        <h3>1. Even Numbers (1 to 100)</h3>
        <button onclick="task1()">Show Even Numbers</button>
        <p id="ans1" style="color: green;"></p>
    </div>

    <div style="margin-bottom: 30px;">
        <h3>2. Calculator</h3>
        <input type="number" id="num1" placeholder="First Number">
        <input type="number" id="num2" placeholder="Second Number">
        <br><br>
        
        <button onclick="calculator('+')">Add (+)</button>
        <button onclick="calculator('-')">Subtract (-)</button>
        <button onclick="calculator('*')">Multiply (*)</button>
        <button onclick="calculator('/')">Divide (/)</button>
        
        <p id="ans2" style="color: green;"></p>
    </div>

    <div style="margin-bottom: 30px;">
        <h3>3. Tax Calculator</h3>
        <input type="number" id="salary" placeholder="Enter Your Salary">
        <button onclick="task3()">Calculate My Tax</button>
        <p id="ans3" style="color: green;"></p>
    </div>

    <div style="margin-bottom: 30px;">
        <h3>4. Sum of Product of Digits</h3>
        <input type="number" id="n1" placeholder="First Number">
        <input type="number" id="n2" placeholder="Second Number">
        <button onclick="task4()">Calculate Sum</button>
        <p id="ans4" style="color: green;"></p>
    </div>

    <script src="script.js"></script>

</body>
</html>
